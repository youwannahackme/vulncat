name: Go Build & Test CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Verify Dependencies
      run: go mod verify

    - name: Run Tests
      run: go test -v ./...

    - name: Build Binary
      run: go build -v -o vulncat
